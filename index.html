<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Ngân Phú Quý - Silver Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .dashboard-container {
            background-color: #1A2745;
            color: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 1150px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        .api-status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            background-color: #4A5568;
            color: #E2E8F0;
        }
        .api-status.success { background-color: #38A169; color: #fff; }
        .api-status.error { background-color: #E53E3E; color: #fff; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .header h2 {
            color: #D4AF37;
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .inputs {
            display: flex;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 11px;
            color: #A0AEC0;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #D4AF37;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            width: 160px;
            font-size: 14px;
            font-weight: bold;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            border-bottom: 2px solid #2A3B5C;
        }

        th {
            padding: 12px;
            color: #D4AF37;
            font-size: 13px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #2A3B5C;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            padding: 12px;
            font-size: 14px;
            vertical-align: middle;
        }

        .product-name { font-weight: 600; }
        .unit { color: #A0AEC0; white-space: nowrap; }
        .buy-price { color: #63B3ED; font-weight: 600; }
        .sell-price { font-weight: bold; color: #fff; }

        /* ── Formula Cell ───────────────────────────── */
        .formula-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .formula-display {
            color: #F6AD55;
            font-style: italic;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.18s;
            white-space: nowrap;
            min-width: 64px;
            text-align: center;
        }

        .formula-display:hover {
            border-color: #F6AD55;
            background: rgba(246, 173, 85, 0.08);
        }

        .edit-btn {
            background: none;
            border: 1px solid #4A5568;
            color: #A0AEC0;
            border-radius: 4px;
            padding: 3px 7px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .edit-btn:hover {
            border-color: #F6AD55;
            color: #F6AD55;
            background: rgba(246, 173, 85, 0.08);
        }

        /* ── Inline edit mode ───────────────────────── */
        .formula-input-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .formula-input {
            width: 90px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #F6AD55;
            background: rgba(246, 173, 85, 0.1);
            color: #F6AD55;
            font-size: 13px;
            outline: none;
            font-weight: bold;
        }

        .formula-input:focus {
            background: rgba(246, 173, 85, 0.16);
            box-shadow: 0 0 0 2px rgba(246, 173, 85, 0.25);
        }

        .confirm-btn {
            background: #38A169;
            border: none;
            color: #fff;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .confirm-btn:hover { background: #2F855A; }

        .cancel-btn {
            background: #4A5568;
            border: none;
            color: #E2E8F0;
            border-radius: 4px;
            padding: 4px 7px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .cancel-btn:hover { background: #718096; }

        /* ── Reset hint ─────────────────────────────── */
        .modified-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #F6AD55;
            display: inline-block;
            margin-left: 2px;
            vertical-align: middle;
            title: "Đã chỉnh sửa";
        }

        /* ── Toolbar bar ────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid #2A3B5C;
            color: #A0AEC0;
            border-radius: 5px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .toolbar-btn:hover {
            border-color: #F6AD55;
            color: #F6AD55;
            background: rgba(246,173,85,0.07);
        }

        .toolbar-hint {
            font-size: 11px;
            color: #4A5568;
            margin-left: auto;
        }

        /* ── Premium cell ───────────────────────────── */
        .premium-cell { color: #FBD38D; font-size: 13px; }
        .premium-zero { color: #4A5568; font-size: 12px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; margin-top: 30px; }
            td, th { padding: 8px; font-size: 12px; }
            .input-group input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="apiStatus" class="api-status">Đang lấy giá tự động...</div>

    <div class="header">
        <h2>Kim Ngân Phú Quý — Live Dashboard</h2>
        <div class="inputs">
            <div class="input-group">
                <label>GIÁ MUA CƠ SỞ (VNĐ/LƯỢNG)</label>
                <input type="text" id="baseBuy" value="2.803.000" oninput="formatInput(this)" onblur="formatOnBlur(this)">
            </div>
            <div class="input-group">
                <label>GIÁ BÁN CƠ SỞ (VNĐ/LƯỢNG)</label>
                <input type="text" id="baseSell" value="2.890.000" oninput="formatInput(this)" onblur="formatOnBlur(this)">
            </div>
        </div>
    </div>

    <div class="toolbar">
        <span style="font-size:12px; color:#A0AEC0;">✏️ Bấm <strong style="color:#F6AD55;">Sửa</strong> ở cột Công thức để chỉnh hệ số quy đổi từng sản phẩm</span>
        <button class="toolbar-btn" onclick="resetAllMultipliers()">↺ Khôi phục tất cả công thức gốc</button>
        <span class="toolbar-hint" id="modifiedCount"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sản phẩm</th>
                <th>Đơn vị</th>
                <th>Công thức quy đổi</th>
                <th>Phí Premium</th>
                <th>Giá Mua Vào</th>
                <th>Giá Bán Ra</th>
            </tr>
        </thead>
        <tbody id="product-table-body"></tbody>
    </table>
</div>

<script>
// ── Product data ─────────────────────────────────────────────────────────────
const products = [
    { name: 'Bạc thỏi Phú Quý 999 1KG',                       unit: '1 KG',     premium: 0,       multiplier: 26.6666 },
    { name: 'Bạc Thanh Long Phú Quý 999 1KG',                  unit: '1 KG',     premium: 0,       multiplier: 26.6666 },
    { name: 'Bạc Thanh Long Phú Quý 999 1KG - M',              unit: '1 KG',     premium: 0,       multiplier: 26.6666 },
    { name: 'Bạc thỏi Phú Quý 999 5L',                         unit: '5 Lượng',  premium: 0,       multiplier: 5 },
    { name: 'Bạc Thanh Long Phú Quý 999 5L',                   unit: '5 Lượng',  premium: 0,       multiplier: 5 },
    { name: 'Bạch Mã Phi Thiên 999 5L',                        unit: '5 Lượng',  premium: 0,       multiplier: 5 },
    { name: 'Bạc Kỷ Niệm 80 Năm Quốc Khánh 999 5L',           unit: '5 Lượng',  premium: 0,       multiplier: 5 },
    { name: 'Bạc Kỷ Niệm 50 Năm TNDN 999 5L',                 unit: '5 Lượng',  premium: 0,       multiplier: 5 },
    { name: 'Bạc Miếng Phú Quý 999 1L',                        unit: '1 Lượng',  premium: 0,       multiplier: 1 },
    { name: 'Ngân Mã Chiêu Tài 999 1L',                        unit: '1 Lượng',  premium: 0,       multiplier: 1 },
    { name: 'Bạc Thanh Long Phú Quý 999 1L',                   unit: '1 Lượng',  premium: 0,       multiplier: 1 },
    { name: 'Bạc Miếng Phú Quý 999 RAN1L',                     unit: '1 Lượng',  premium: 0,       multiplier: 1 },
    { name: 'Đồng Bạc Bát Bảo Cát Tường 5 Chỉ',               unit: '5 Chỉ',    premium: 204000,  multiplier: 0.5 },
    { name: 'Đồng Bạc Liên Hoa Bồ Đề 1 Lượng',                unit: '1 Lượng',  premium: 408000,  multiplier: 1 },
    { name: 'Miếng Bạc PAMP Dragon 10G 2024',                  unit: '10g',      premium: 1219770, multiplier: 0.2666 },
    { name: 'Đồng Bạc Panda 30G 2024',                         unit: '30g',      premium: 540000,  multiplier: 0.8 },
    { name: 'Đồng Bạc Buffalo Matte 1 Oz (Bản mờ)',            unit: '1 Oz',     premium: 338640,  multiplier: 0.83 },
    { name: 'Đồng Bạc Buffalo Proof 1 Oz (Bản bóng)',          unit: '1 Oz',     premium: 338640,  multiplier: 0.83 },
    { name: 'Đồng Bạc Britannia Charles III 1 Oz 2024',        unit: '1 Oz',     premium: 390100,  multiplier: 0.83 },
    { name: 'Đồng Bạc Kangaroo 1 Oz 2024',                     unit: '1 Oz',     premium: 390100,  multiplier: 0.83 },
    { name: 'Đồng Bạc Maple Leaf 1 Oz 2024',                   unit: '1 Oz',     premium: 390100,  multiplier: 0.83 },
    { name: 'Đồng Bạc American Eagle 1 Oz 2024',               unit: '1 Oz',     premium: 539500,  multiplier: 0.83 },
    { name: 'Đồng Bạc Dragon III 1 Oz 2024',                   unit: '1 Oz',     premium: 709650,  multiplier: 0.83 },
    { name: 'Đồng Bạc Dragon Colour III 2024 1 Oz',            unit: '1 Oz',     premium: 709650,  multiplier: 0.83 },
];

// ── State: current multipliers (overridable per product) ─────────────────────
const defaultMultipliers = products.map(p => p.multiplier);
const currentMultipliers = [...defaultMultipliers];

// ── Helpers ──────────────────────────────────────────────────────────────────
function parseNumber(str) {
    const val = parseInt(str.replace(/\./g, '').replace(/,/g, ''), 10);
    return isNaN(val) ? 0 : val;
}
function formatCurrency(value) {
    return Math.round(value).toLocaleString('vi-VN') + ' đ';
}
function formatInput(el) {
    let raw = el.value.replace(/\D/g, '');
    if (!raw) { el.value = ''; updateDashboard(); return; }
    el.value = parseInt(raw, 10).toLocaleString('vi-VN');
    updateDashboard();
}
function formatOnBlur(el) {
    let val = parseNumber(el.value);
    if (val > 0 && val < 100000) val *= 1000;
    if (val > 0) { el.value = val.toLocaleString('vi-VN'); updateDashboard(); }
}

// ── Render a single row ───────────────────────────────────────────────────────
function renderRow(i, rawBuy, rawSell) {
    const item     = products[i];
    const mult     = currentMultipliers[i];
    const isModified = mult !== defaultMultipliers[i];
    const buyPrice  = rawBuy  * mult;
    const sellPrice = (rawSell * mult) + item.premium;

    const tbody = document.getElementById('product-table-body');
    const existingRow = tbody.querySelector(`tr[data-idx="${i}"]`);
    const row = existingRow || document.createElement('tr');
    row.dataset.idx = i;

    // Formula cell content
    const formulaCell = `
        <div class="formula-cell" id="fcel-${i}">
            <span class="formula-display" onclick="startEdit(${i})" title="Bấm để chỉnh sửa hệ số">
                × ${mult}${isModified ? '<span class="modified-dot" title="Đã chỉnh sửa"></span>' : ''}
            </span>
            <button class="edit-btn" onclick="startEdit(${i})">Sửa</button>
            ${isModified ? `<button class="cancel-btn" onclick="resetOne(${i})" title="Khôi phục gốc">↺</button>` : ''}
        </div>`;

    row.innerHTML = `
        <td class="product-name">${item.name}</td>
        <td class="unit">${item.unit}</td>
        <td>${formulaCell}</td>
        <td class="${item.premium === 0 ? 'premium-zero' : 'premium-cell'}">${item.premium === 0 ? '—' : formatCurrency(item.premium)}</td>
        <td class="buy-price">${formatCurrency(buyPrice)}</td>
        <td class="sell-price">${formatCurrency(sellPrice)}</td>
    `;

    if (!existingRow) tbody.appendChild(row);
    updateModifiedCount();
}

// ── Main render ───────────────────────────────────────────────────────────────
function updateDashboard() {
    let rawBuy = parseNumber(document.getElementById('baseBuy').value);
    if (rawBuy > 0 && rawBuy < 100000) rawBuy *= 1000;
    let rawSell = parseNumber(document.getElementById('baseSell').value);
    if (rawSell > 0 && rawSell < 100000) rawSell *= 1000;

    const tbody = document.getElementById('product-table-body');
    tbody.innerHTML = '';
    products.forEach((_, i) => renderRow(i, rawBuy, rawSell));
}

// ── Inline edit ───────────────────────────────────────────────────────────────
function startEdit(i) {
    const fcel = document.getElementById(`fcel-${i}`);
    const currentVal = currentMultipliers[i];

    fcel.innerHTML = `
        <div class="formula-input-wrap">
            <span style="color:#A0AEC0; font-size:13px;">×</span>
            <input class="formula-input" id="finput-${i}" type="number" step="any"
                   value="${currentVal}" min="0"
                   onkeydown="handleEditKey(event, ${i})"
                   autofocus>
            <button class="confirm-btn" onclick="confirmEdit(${i})" title="Xác nhận (Enter)">✓</button>
            <button class="cancel-btn"  onclick="cancelEdit(${i})"  title="Hủy (Esc)">✕</button>
        </div>`;

    const input = document.getElementById(`finput-${i}`);
    input.focus();
    input.select();
}

function handleEditKey(e, i) {
    if (e.key === 'Enter')  { e.preventDefault(); confirmEdit(i); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(i); }
}

function confirmEdit(i) {
    const input = document.getElementById(`finput-${i}`);
    const newVal = parseFloat(input.value);

    if (isNaN(newVal) || newVal <= 0) {
        input.style.borderColor = '#E53E3E';
        input.title = 'Hệ số phải là số dương';
        input.focus();
        return;
    }

    currentMultipliers[i] = newVal;
    refreshRow(i);
}

function cancelEdit(i) {
    refreshRow(i);
}

function resetOne(i) {
    currentMultipliers[i] = defaultMultipliers[i];
    refreshRow(i);
}

function resetAllMultipliers() {
    defaultMultipliers.forEach((v, i) => { currentMultipliers[i] = v; });
    updateDashboard();
}

function refreshRow(i) {
    let rawBuy = parseNumber(document.getElementById('baseBuy').value);
    if (rawBuy > 0 && rawBuy < 100000) rawBuy *= 1000;
    let rawSell = parseNumber(document.getElementById('baseSell').value);
    if (rawSell > 0 && rawSell < 100000) rawSell *= 1000;

    const tbody = document.getElementById('product-table-body');
    const oldRow = tbody.querySelector(`tr[data-idx="${i}"]`);
    if (oldRow) oldRow.remove();

    // Re-insert at correct position
    const allRows = [...tbody.querySelectorAll('tr[data-idx]')];
    const nextRow = allRows.find(r => parseInt(r.dataset.idx) > i);

    const newRow = document.createElement('tr');
    newRow.dataset.idx = i;
    if (nextRow) tbody.insertBefore(newRow, nextRow);
    else tbody.appendChild(newRow);

    // Assign html to the new row
    const mult     = currentMultipliers[i];
    const item     = products[i];
    const isModified = mult !== defaultMultipliers[i];
    const buyPrice  = rawBuy  * mult;
    const sellPrice = (rawSell * mult) + item.premium;

    newRow.innerHTML = `
        <td class="product-name">${item.name}</td>
        <td class="unit">${item.unit}</td>
        <td>
            <div class="formula-cell" id="fcel-${i}">
                <span class="formula-display" onclick="startEdit(${i})" title="Bấm để chỉnh sửa hệ số">
                    × ${mult}${isModified ? '<span class="modified-dot" title="Đã chỉnh sửa"></span>' : ''}
                </span>
                <button class="edit-btn" onclick="startEdit(${i})">Sửa</button>
                ${isModified ? `<button class="cancel-btn" onclick="resetOne(${i})" title="Khôi phục gốc">↺</button>` : ''}
            </div>
        </td>
        <td class="${item.premium === 0 ? 'premium-zero' : 'premium-cell'}">${item.premium === 0 ? '—' : formatCurrency(item.premium)}</td>
        <td class="buy-price">${formatCurrency(buyPrice)}</td>
        <td class="sell-price">${formatCurrency(sellPrice)}</td>
    `;
    updateModifiedCount();
}

function updateModifiedCount() {
    const count = currentMultipliers.filter((v, i) => v !== defaultMultipliers[i]).length;
    const el = document.getElementById('modifiedCount');
    el.textContent = count > 0 ? `🟡 ${count} công thức đã chỉnh sửa` : '';
}

// ── Live API ─────────────────────────────────────────────────────────────────
async function fetchLivePrice() {
    const statusEl = document.getElementById('apiStatus');
    try {
        const response = await fetch('https://be.phuquy.com.vn/jewelry/product-payment-service/api/sync-price-history/get-sync-history-today?productType=BAC');
        if (!response.ok) throw new Error('API không phản hồi');
        const apiData = await response.json();
        console.log("Dữ liệu API:", apiData);

        let liveBuy  = apiData?.data?.[0]?.buy  || null;
        let liveSell = apiData?.data?.[0]?.sell || null;

        if (liveBuy && liveSell) {
            document.getElementById('baseBuy').value  = liveBuy.toLocaleString('vi-VN');
            document.getElementById('baseSell').value = liveSell.toLocaleString('vi-VN');
            statusEl.textContent  = 'Trạng thái: API Live (Hoạt động)';
            statusEl.className    = 'api-status success';
            updateDashboard();
        } else {
            throw new Error('Không tìm thấy trường giá trong JSON');
        }
    } catch (err) {
        console.error("Lỗi API:", err);
        statusEl.textContent = 'Trạng thái: Dùng giá Manual (Lỗi kết nối / CORS)';
        statusEl.className   = 'api-status error';
    }
}

// ── Init ─────────────────────────────────────────────────────────────────────
updateDashboard();
fetchLivePrice();
</script>
</body>
</html>
